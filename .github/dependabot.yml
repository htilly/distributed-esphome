# Dependabot config (E.6).
#
# All PRs target ``develop`` (not main) so dependency updates flow through
# the normal dev cycle and get included in the next release. Targeting main
# would require merging then pulling back into develop — unnecessary churn.
#
# Weekly schedule. The release-time gate in ``dev-plans/RELEASE_CHECKLIST.md``
# checks for open high/critical alerts before tagging.
#
# Six ecosystems:
#   - pip × 2 (server + client requirements.txt)
#   - npm (frontend)
#   - docker × 2 (server + client Dockerfile base images)
#   - github-actions (every workflow under .github/workflows/)
#
# Open PR cap is intentionally low so the queue doesn't snowball.

version: 2
updates:
  - package-ecosystem: pip
    directory: /ha-addon/server
    target-branch: develop
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - python

  - package-ecosystem: pip
    directory: /ha-addon/client
    target-branch: develop
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - python

  # ha-addon/client/esphome-constraints/*.txt is a hash-pinned lockfile
  # generated wholesale by scripts/regen-esphome-constraints.sh (run from
  # .github/workflows/regen-esphome-constraints.yml on a weekly schedule).
  # Dependabot was scanning it as a requirements file and opening PRs for
  # every transitive dep of ESPHome (tibs, resvg-py, uvicorn, …) —
  # individual line bumps break --require-hashes integrity and get
  # overwritten by the next regen anyway. Declare the directory with a
  # zero PR cap so Dependabot knows about it and leaves it alone.
  - package-ecosystem: pip
    directory: /ha-addon/client/esphome-constraints
    target-branch: develop
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 0

  - package-ecosystem: npm
    directory: /ha-addon/ui
    target-branch: develop
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - frontend

  - package-ecosystem: docker
    directory: /ha-addon
    target-branch: develop
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 3
    labels:
      - dependencies
      - docker
    ignore:
      # Python base image major bumps need lockfile regeneration + compile-test
      # validation — don't auto-propose. Patch/minor updates are fine.
      - dependency-name: python
        update-types: ["version-update:semver-major"]

  - package-ecosystem: docker
    directory: /ha-addon/client
    target-branch: develop
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 3
    labels:
      - dependencies
      - docker
    ignore:
      - dependency-name: python
        update-types: ["version-update:semver-major"]

  - package-ecosystem: github-actions
    directory: /
    target-branch: develop
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 3
    labels:
      - dependencies
      - ci
